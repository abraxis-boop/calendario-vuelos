<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vuelos Dilitours</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --azul:       #0B1F3A;
    --azul-med:   #1A3A5C;
    --azul-ac:    #1E6FBA;
    --azul-claro: #C8DDEF;
    --dorado:     #D4A843;
    --dorado-cl:  #FDF3DC;
    --blanco:     #FFFFFF;
    --gris-bg:    #EEF2F7;
    --gris-bd:    #D0D9E6;
    --gris-txt:   #5A6A80;
    --verde:      #117A45;
    --verde-cl:   #D4EFE1;
    --font: 'Inter', 'Segoe UI', system-ui, sans-serif;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--azul);
    font-family: var(--font);
    color: var(--blanco);
  }

  /* ══════════════════════════════════════
     LAYOUT RAÍZ: header + cuerpo
  ══════════════════════════════════════ */
  .root {
    width: 100vw;
    height: 100vh;
    display: grid;
    grid-template-rows: 88px 1fr;
  }

  /* ── HEADER ─────────────────────────── */
  header {
    background: var(--azul);
    border-bottom: 3px solid var(--dorado);
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    padding: 0 32px;
    gap: 32px;
    position: relative;
    z-index: 10;
  }

  .h-marca {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo-wrap {
    width: 56px; height: 56px;
    border-radius: 50%;
    overflow: hidden;
    border: 2px solid var(--dorado);
    flex-shrink: 0;
    background: var(--dorado);
    display: flex; align-items: center; justify-content: center;
  }

  .logo-wrap img { width: 100%; height: 100%; object-fit: cover; }
  .logo-fallback { font-size: 18px; font-weight: 900; color: var(--azul); }

  .marca-texto h1 {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
    line-height: 1.1;
  }

  .marca-texto p {
    font-size: 11px;
    color: var(--dorado);
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* título central */
  .h-titulo {
    text-align: center;
  }

  .h-titulo h2 {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: var(--blanco);
  }

  .h-titulo p {
    font-size: 12px;
    color: rgba(255,255,255,0.45);
    margin-top: 2px;
    letter-spacing: 0.5px;
  }

  /* reloj + clima */
  .h-info {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .clima-block {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    padding: 8px 14px;
  }

  .clima-icon { font-size: 28px; line-height: 1; }

  .clima-datos { line-height: 1.3; }
  .clima-temp  { font-size: 20px; font-weight: 700; }
  .clima-desc  { font-size: 10px; color: rgba(255,255,255,0.5); text-transform: capitalize; }

  .reloj-block { text-align: right; }
  .reloj-time  { font-size: 30px; font-weight: 300; letter-spacing: 2px; font-variant-numeric: tabular-nums; line-height: 1; }
  .reloj-fecha { font-size: 11px; color: rgba(255,255,255,0.45); margin-top: 3px; text-transform: capitalize; }

  /* ── CUERPO: izquierda + derecha ───── */
  .body-grid {
    display: grid;
    grid-template-columns: 380px 1fr;
    min-height: 0;
    background: var(--gris-bg);
  }

  /* ══════════════════════════════════════
     PANEL IZQUIERDO — HOY
  ══════════════════════════════════════ */
  .panel-hoy {
    background: var(--azul-med);
    display: flex;
    flex-direction: column;
    min-height: 0;
    border-right: 3px solid rgba(212,168,67,0.3);
  }

  .panel-hoy-head {
    padding: 18px 20px 14px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    flex-shrink: 0;
  }

  .panel-hoy-head .etiqueta {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--dorado);
    margin-bottom: 4px;
  }

  .panel-hoy-head .fecha-hoy {
    font-size: 16px;
    font-weight: 700;
    color: var(--blanco);
    text-transform: capitalize;
  }

  .panel-hoy-stats {
    display: flex;
    gap: 0;
    border-top: 1px solid rgba(255,255,255,0.07);
    margin-top: 10px;
  }

  .stat-box {
    flex: 1;
    padding: 8px 0;
    text-align: center;
    border-right: 1px solid rgba(255,255,255,0.07);
  }
  .stat-box:last-child { border-right: none; }
  .stat-num  { font-size: 26px; font-weight: 800; line-height: 1; }
  .stat-lbl  { font-size: 10px; color: rgba(255,255,255,0.45); text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }

  /* Lista de vuelos de hoy — scrollea automáticamente */
  .hoy-lista {
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  .hoy-lista-inner {
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 14px 16px;
    transition: transform 0.8s ease;
  }

  /* Card de vuelo de hoy */
  .card-hoy {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-left: 5px solid var(--azul-ac);
    border-radius: 10px;
    padding: 14px 16px;
    flex-shrink: 0;
  }

  .card-hoy.salida  { border-left-color: var(--verde); }
  .card-hoy.regreso { border-left-color: #4A9FE0; }

  .card-hoy-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 10px;
  }

  .card-hora {
    font-size: 38px;
    font-weight: 900;
    letter-spacing: -1px;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    color: var(--blanco);
  }

  .card-hoy-badges {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 4px;
  }

  .badge-dir {
    font-size: 11px;
    font-weight: 800;
    padding: 4px 10px;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .badge-dir.salida  { background: var(--verde-cl); color: var(--verde); }
  .badge-dir.regreso { background: var(--azul-claro); color: var(--azul-med); }

  .badge-tipo {
    font-size: 10px;
    color: rgba(255,255,255,0.45);
    font-weight: 500;
  }

  .card-aero {
    font-size: 17px;
    font-weight: 700;
    color: rgba(255,255,255,0.95);
    margin-bottom: 10px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-hoy-datos {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    background: rgba(0,0,0,0.15);
    border-radius: 8px;
    padding: 10px 12px;
  }

  .dato-item span {
    display: block;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
    margin-bottom: 2px;
  }

  .dato-item strong {
    font-size: 13px;
    font-weight: 700;
    color: rgba(255,255,255,0.9);
  }

  .dato-item.full { grid-column: span 2; }

  /* vuelos pasados: ocultos completamente */
  .card-hoy.pasado  { display: none; }
  .vuelo-sem.pasado { display: none; }

  /* ══════════════════════════════════════
     PANEL DERECHO — SEMANAL
  ══════════════════════════════════════ */
  .panel-semana {
    display: flex;
    flex-direction: column;
    min-height: 0;
    background: var(--gris-bg);
  }

  .semana-nav-bar {
    padding: 12px 20px;
    border-bottom: 1px solid var(--gris-bd);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    background: var(--blanco);
  }

  .semana-titulo {
    font-size: 13px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--azul);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .semana-titulo::before {
    content: '';
    display: block;
    width: 4px; height: 16px;
    background: var(--dorado);
    border-radius: 2px;
  }

  .semana-rango {
    font-size: 12px;
    font-weight: 600;
    color: var(--gris-txt);
  }

  /* Grid 7 columnas */
  .semana-grid {
    flex: 1;
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 0;
    min-height: 0;
    overflow: hidden;
  }

  .dia-col {
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--gris-bd);
    min-height: 0;
  }
  .dia-col:last-child { border-right: none; }

  .dia-col.es-hoy {
    background: rgba(30, 111, 186, 0.04);
  }

  .dia-head {
    padding: 10px 8px 8px;
    text-align: center;
    border-bottom: 2px solid var(--gris-bd);
    background: var(--blanco);
    flex-shrink: 0;
  }

  .dia-col.es-hoy .dia-head {
    background: var(--dorado-cl);
    border-bottom-color: var(--dorado);
  }

  .dia-nombre {
    font-size: 13px;
    font-weight: 800;
    color: var(--azul);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .dia-col.es-hoy .dia-nombre { color: #7A5A10; }

  .dia-fecha-str {
    font-size: 11px;
    color: var(--gris-txt);
    margin-top: 2px;
  }

  .dia-col.es-hoy .dia-fecha-str { color: #9A7020; }

  .dia-count-pill {
    display: inline-block;
    margin-top: 5px;
    background: var(--azul);
    color: var(--blanco);
    font-size: 10px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 10px;
  }

  .dia-col.es-hoy .dia-count-pill { background: var(--dorado); color: var(--azul); }

  .dia-lista {
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  .dia-lista-inner {
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 8px 6px;
    transition: transform 0.8s ease;
  }

  /* Card de vuelo en semana */
  .vuelo-sem {
    background: var(--blanco);
    border: 1px solid var(--gris-bd);
    border-left: 4px solid var(--azul-ac);
    border-radius: 6px;
    padding: 8px 8px 6px;
    flex-shrink: 0;
  }
  .vuelo-sem.salida  { border-left-color: var(--verde); }
  .vuelo-sem.regreso { border-left-color: var(--azul-ac); }
  .vuelo-sem.pasado  { opacity: 0.4; }

  .vsem-hora {
    font-size: 20px;
    font-weight: 900;
    color: var(--azul);
    line-height: 1;
    letter-spacing: -0.5px;
    font-variant-numeric: tabular-nums;
  }

  .vsem-aero {
    font-size: 11px;
    font-weight: 700;
    color: var(--azul-med);
    margin-top: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .vsem-bottom {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 5px;
    padding-top: 4px;
    border-top: 1px dashed var(--gris-bd);
    font-size: 9px;
    color: var(--gris-txt);
  }

  .vsem-badge {
    font-size: 8px;
    font-weight: 800;
    padding: 2px 5px;
    border-radius: 3px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .vsem-badge.salida  { background: var(--verde-cl); color: var(--verde); }
  .vsem-badge.regreso { background: #D6E8F7; color: var(--azul-ac); }

  .dia-vacio {
    padding: 20px 8px;
    text-align: center;
    font-size: 11px;
    color: var(--gris-bd);
    font-style: italic;
  }

  /* ── ESTADOS ──────────────────────── */
  .cargando-overlay {
    position: fixed; inset: 0;
    background: var(--azul);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 16px;
    z-index: 200;
    transition: opacity 0.6s;
  }
  .cargando-overlay.oculto { opacity: 0; pointer-events: none; }
  .spinner-grande {
    width: 48px; height: 48px;
    border: 4px solid rgba(255,255,255,0.15);
    border-top-color: var(--dorado);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .cargando-txt { font-size: 15px; color: rgba(255,255,255,0.5); letter-spacing: 1px; }

  /* ── PRÓXIMO VUELO: barra inferior ── */
  .proximo-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 44px;
    background: var(--dorado);
    color: var(--azul);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    font-size: 14px;
    font-weight: 700;
    z-index: 50;
    letter-spacing: 0.3px;
  }

  .proximo-bar .sep { opacity: 0.4; }

  /* ── TICK ACTUAL ──────────────────── */
  .hoy-actual-marker {
    position: absolute;
    left: 0; right: 0;
    height: 2px;
    background: var(--dorado);
    z-index: 5;
  }
</style>
</head>

<script>
// ── CONFIG ──────────────────────────────────────────────────────
const APP_ID  = 'dc1776cd-0755-452a-98e0-55ee2b5896c1';
const API_KEY = 'V2-g6t83-Fm2aG-kK7cO-tMKW0-Xr9Ut-ULIHd-PRRYm-Plpqu';
const TABLA   = 'Vuelos';
const URL_AS  = `https://api.appsheet.com/api/v2/apps/${APP_ID}/tables/${TABLA}/Action`;

const COL = {
  aerolinea:  'nombre_aerolinea',
  hora:       'hora',
  aplicantes: 'nombres_aplicantes_list',
  fecha:      'fecha',
  codigo:     'codigo_vuelo',
  numVuelo:   'numero_vuelo',
  tipoVuelo:  'tipo_vuelo',
  direccion:  'Salida o regreso',
  titulo:     'encabezado_calendario'
};

const DIAS_ES   = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
const DIAS_CORTO = ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
const MESES_ES  = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

let vuelos = [];

// ── INICIO ──────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  reloj();
  clima();
  cargar();
  setInterval(reloj, 1000);
  setInterval(clima,  30 * 60 * 1000);
  setInterval(cargar,  4 * 60 * 1000);
  // Auto-scroll cada 4 s
  setInterval(autoScroll, 4000);
});

// ── RELOJ ────────────────────────────────────────────────────────
function reloj() {
  const n = new Date();
  document.getElementById('reloj').textContent =
    n.toLocaleTimeString('es-MX', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
  document.getElementById('relojFecha').textContent =
    `${DIAS_ES[n.getDay()]} ${n.getDate()} de ${MESES_ES[n.getMonth()]}`;
  document.getElementById('fechaHoy').textContent =
    `${DIAS_ES[n.getDay()]}, ${n.getDate()} de ${MESES_ES[n.getMonth()]}`;
}

// ── CLIMA (Open-Meteo, sin API key) ─────────────────────────────
async function clima() {
  try {
    const r = await fetch('https://api.open-meteo.com/v1/forecast?latitude=21.5089&longitude=-104.8947&current=temperature_2m,weather_code&timezone=auto');
    const d = await r.json();
    const t = Math.round(d.current.temperature_2m);
    const c = d.current.weather_code;
    const map = {
      0:['☀️','Despejado'], 1:['🌤','Mayormente despejado'], 2:['⛅','Parcialmente nublado'],
      3:['☁️','Nublado'], 45:['🌫','Neblina'], 48:['🌫','Neblina'], 51:['🌦','Llovizna'],
      61:['🌧','Lluvia'], 63:['🌧','Lluvia moderada'], 80:['🌦','Chubascos'],
      95:['⛈','Tormenta'], 96:['⛈','Tormenta con granizo']
    };
    const [icon, desc] = map[c] || ['🌡','Variable'];
    document.getElementById('climaIcon').textContent = icon;
    document.getElementById('climaTemp').textContent = `${t}°C`;
    document.getElementById('climaDesc').textContent = desc + ' · Tepic';
  } catch { /* silencioso */ }
}

// ── NORMALIZAR FECHA ─────────────────────────────────────────────
function normFecha(s) {
  if (!s) return '';
  const p = s.toString().split(' ')[0].trim();
  if (/^\d{4}[-\/]\d{1,2}[-\/]\d{1,2}$/.test(p)) {
    const [y,m,d] = p.split(/[-\/]/);
    return `${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`;
  }
  if (/^\d{1,2}[-\/]\d{1,2}[-\/]\d{4}$/.test(p)) {
    const [a,b,y] = p.split(/[-\/]/);
    return parseInt(a) > 12
      ? `${y}-${b.padStart(2,'0')}-${a.padStart(2,'0')}`
      : `${y}-${a.padStart(2,'0')}-${b.padStart(2,'0')}`;
  }
  return p;
}

function fechaStr(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function esc(v) {
  return v == null ? '' : String(v).replace(/&/g,'&amp;').replace(/</g,'&lt;');
}

// ── CARGAR APPSHEET ──────────────────────────────────────────────
async function cargar() {
  try {
    const r = await fetch(URL_AS, {
      method: 'POST',
      headers: { 'applicationAccessKey': API_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ Action:'Find', Properties:{Locale:'es-MX'}, Rows:[] })
    });
    if (!r.ok) throw new Error(r.status);
    const d = await r.json();
    vuelos = Array.isArray(d) ? d : (d.Rows || []);
    render();
    document.getElementById('overlay').classList.add('oculto');
  } catch(e) {
    console.error('AppSheet error:', e);
    // Reintentar en 30s si falla
    setTimeout(cargar, 30000);
  }
}

// ── RENDER PRINCIPAL ─────────────────────────────────────────────
function render() {
  renderHoy();
  renderSemana();
  renderProximo();
}

// ── PANEL HOY ────────────────────────────────────────────────────
function renderHoy() {
  const hoy = fechaStr(new Date());
  const ahora = new Date();
  const hhmm  = ahora.getHours() * 60 + ahora.getMinutes();

  const vHoyTodos = vuelos
    .filter(v => normFecha(v[COL.fecha]) === hoy)
    .sort((a,b) => (a[COL.hora]||'').localeCompare(b[COL.hora]||''));

  // Solo pendientes (no pasados)
  const vHoy = vHoyTodos.filter(v => !esPasado(v[COL.hora], hhmm));

  document.getElementById('stTotal').textContent = vHoy.length;
  document.getElementById('stSal').textContent   = vHoy.filter(v => esDir(v,'salida')).length;
  document.getElementById('stReg').textContent   = vHoy.filter(v => esDir(v,'regreso')).length;

  document.getElementById('subTitulo').textContent =
    `${vHoy.length} vuelo${vHoy.length !== 1 ? 's' : ''} pendiente${vHoy.length !== 1 ? 's' : ''} hoy · Auto-actualiza cada 4 min`;

  const lista = document.getElementById('listaHoy');
  if (!vHoy.length) {
    lista.innerHTML = `<div style="text-align:center; color:rgba(255,255,255,0.25); padding: 40px 16px; font-size:13px;">✅ Sin vuelos pendientes hoy</div>`;
    return;
  }

  lista.innerHTML = vHoy.map(v => {
    const dir = esDir(v,'regreso') ? 'regreso' : 'salida';
    return `
      <div class="card-hoy ${dir}">
        <div class="card-hoy-top">
          <div class="card-hora">${esc(v[COL.hora]) || '—'}</div>
          <div class="card-hoy-badges">
            <span class="badge-dir ${dir}">${dir === 'salida' ? '🛫 Salida' : '🛬 Regreso'}</span>
            <span class="badge-tipo">${esc(v[COL.tipoVuelo]) || ''}</span>
          </div>
        </div>
        <div class="card-aero">${esc(v[COL.aerolinea]) || '—'}</div>
        <div class="card-hoy-datos">
          <div class="dato-item"><span>Vuelo</span><strong>${esc(v[COL.numVuelo]) || '—'}</strong></div>
          <div class="dato-item"><span>Pasajeros</span><strong>👥 ${esc(v[COL.aplicantes]) || '0'}</strong></div>
          <div class="dato-item full"><span>Código de confirmación</span><strong>🔑 ${esc(v[COL.codigo]) || '—'}</strong></div>
        </div>
      </div>`;
  }).join('');
}

// ── PANEL SEMANA ─────────────────────────────────────────────────
function renderSemana() {
  const hoy   = new Date();
  const dow   = hoy.getDay();
  const lunes = new Date(hoy);
  lunes.setDate(hoy.getDate() - (dow === 0 ? 6 : dow - 1));

  const semana = Array.from({length:7}, (_,i) => {
    const d = new Date(lunes); d.setDate(lunes.getDate() + i); return d;
  });

  const hoyStr = fechaStr(hoy);
  const ahora  = hoy.getHours() * 60 + hoy.getMinutes();

  document.getElementById('semanaRango').textContent =
    `${semana[0].getDate()} de ${MESES_ES[semana[0].getMonth()]} — ${semana[6].getDate()} de ${MESES_ES[semana[6].getMonth()]}`;

  const grid = document.getElementById('semanaGrid');
  grid.innerHTML = semana.map((fecha, i) => {
    const str   = fechaStr(fecha);
    const esHoy = str === hoyStr;

    const vDiaTodos = vuelos
      .filter(v => normFecha(v[COL.fecha]) === str)
      .sort((a,b) => (a[COL.hora]||'').localeCompare(b[COL.hora]||''));

    // En el día de hoy, ocultar pasados; en otros días mostrar todos
    const vDia = esHoy
      ? vDiaTodos.filter(v => !esPasado(v[COL.hora], ahora))
      : vDiaTodos;

    const filas = vDia.length
      ? vDia.map(v => {
          const dir = esDir(v,'regreso') ? 'regreso' : 'salida';
          return `
            <div class="vuelo-sem ${dir}">
              <div class="vsem-hora">${esc(v[COL.hora]) || '—'}</div>
              <div class="vsem-aero">${esc(v[COL.aerolinea]) || esc(v[COL.titulo]) || '—'}</div>
              <div class="vsem-bottom">
                <span>✈ ${esc(v[COL.numVuelo]) || '—'}</span>
                <span class="vsem-badge ${dir}">${dir === 'salida' ? 'SAL' : 'REG'}</span>
              </div>
            </div>`;
        }).join('')
      : `<div class="dia-vacio">${esHoy ? '✅ Todo completado' : 'Sin vuelos'}</div>`;

    return `
      <div class="dia-col ${esHoy ? 'es-hoy' : ''}">
        <div class="dia-head">
          <div class="dia-nombre">${DIAS_CORTO[i]}</div>
          <div class="dia-fecha-str">${fecha.getDate()} ${MESES_ES[fecha.getMonth()].slice(0,3)}</div>
          <span class="dia-count-pill">${vDia.length}</span>
        </div>
        <div class="dia-lista">
          <div class="dia-lista-inner" id="dl-${i}">${filas}</div>
        </div>
      </div>`;
  }).join('');
}

// ── BARRA: PRÓXIMO VUELO ─────────────────────────────────────────
function renderProximo() {
  const hoy   = fechaStr(new Date());
  const ahora = new Date();
  const hhmm  = ahora.getHours() * 60 + ahora.getMinutes();

  const proximos = vuelos
    .filter(v => normFecha(v[COL.fecha]) === hoy && !esPasado(v[COL.hora], hhmm))
    .sort((a,b) => (a[COL.hora]||'').localeCompare(b[COL.hora]||''));

  const bar = document.getElementById('proximoBar');

  if (!proximos.length) {
    bar.style.display = 'none';
    return;
  }

  const p   = proximos[0];
  const min = minutosHasta(p[COL.hora], hhmm);
  const txt = min <= 0   ? 'AHORA'
            : min < 60   ? `en ${min} min`
            : min < 120  ? `en 1 h ${min % 60} min`
            : `en ${Math.floor(min/60)} h`;

  bar.style.display = 'flex';
  bar.innerHTML = `
    <span>✈ PRÓXIMO VUELO</span>
    <span class="sep">|</span>
    <span>${esc(p[COL.hora])} — ${esc(p[COL.aerolinea])}</span>
    <span class="sep">|</span>
    <span>${txt.toUpperCase()}</span>
    ${proximos.length > 1 ? `<span class="sep">|</span><span>${proximos.length - 1} más hoy</span>` : ''}
  `;
}

// ── AUTO-SCROLL ──────────────────────────────────────────────────
const scrollState = { hoy: 0, cols: Array(7).fill(0) };

function autoScroll() {
  scrollPanel('listaHoy', 'hoy');
  for (let i = 0; i < 7; i++) {
    const el = document.getElementById(`dl-${i}`);
    if (el) scrollInner(el, i);
  }
  renderProximo(); // actualizar contador
}

function scrollPanel(wrapperId, key) {
  const wrapper = document.getElementById(wrapperId);
  if (!wrapper) return;
  const inner = wrapper.querySelector ? wrapper : wrapper;
  const parent = wrapper.parentElement;
  if (!parent) return;

  const maxScroll = inner.scrollHeight - parent.clientHeight;
  if (maxScroll <= 0) { scrollState[key] = 0; return; }

  scrollState[key] = Math.min(scrollState[key] + parent.clientHeight * 0.4, maxScroll);
  if (scrollState[key] >= maxScroll - 2) scrollState[key] = 0;
  inner.style.transform = `translateY(-${scrollState[key]}px)`;
}

function scrollInner(inner, i) {
  if (!inner) return;
  const parent = inner.parentElement;
  if (!parent) return;
  const maxScroll = inner.scrollHeight - parent.clientHeight;
  if (maxScroll <= 0) { scrollState.cols[i] = 0; return; }

  scrollState.cols[i] = Math.min(scrollState.cols[i] + parent.clientHeight * 0.5, maxScroll);
  if (scrollState.cols[i] >= maxScroll - 2) scrollState.cols[i] = 0;
  inner.style.transform = `translateY(-${scrollState.cols[i]}px)`;
}

// ── HELPERS ──────────────────────────────────────────────────────
function esDir(v, tipo) {
  return (v[COL.direccion] || '').toString().toLowerCase().includes(tipo);
}

function esPasado(horaStr, hhmm) {
  if (!horaStr) return false;
  const [h, m] = horaStr.split(':').map(Number);
  return (h * 60 + (m || 0)) < hhmm;
}

function minutosHasta(horaStr, hhmm) {
  if (!horaStr) return 9999;
  const [h, m] = horaStr.split(':').map(Number);
  return (h * 60 + (m || 0)) - hhmm;
}
