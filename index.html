<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agenda de Vuelos – Dilitours</title>
  <link rel="stylesheet" href="estilos.css">
  <link rel="icon" type="image/png" href="https://lh3.googleusercontent.com/d/1YEEC7rW6x5QPgxGorTBylZztORQtf2wu">
</head>
<body>

  <!-- OVERLAY DE CARGA -->
  <div class="cargando-overlay" id="overlay">
    <div class="spinner-grande"></div>
    <div class="cargando-txt">Conectando con AppSheet…</div>
  </div>

  <div class="root">

    <!-- ── HEADER ── -->
    <header>
      <div class="h-marca">
        <div class="logo-wrap">
          <img src="https://lh3.googleusercontent.com/d/1YEEC7rW6x5QPgxGorTBylZztORQtf2wu"
               alt="Dilitours"
               onerror="this.style.display='none'; document.querySelector('.logo-fallback').style.display='flex';">
          <span class="logo-fallback" style="display:none">DT</span>
        </div>
        <div class="marca-texto">
          <h1>Dilitours</h1>
          <p>Agencia de Viajes</p>
        </div>
      </div>

      <div class="h-titulo">
        <h2>✈ Agenda de Vuelos</h2>
        <p id="subTitulo">Monitoreo en tiempo real</p>
      </div>

      <div class="h-info">
        <div class="clima-block">
          <div class="clima-icon" id="climaIcon">⏳</div>
          <div class="clima-datos">
            <div class="clima-temp" id="climaTemp">—°C</div>
            <div class="clima-desc" id="climaDesc">Tepic, Nay.</div>
          </div>
        </div>
        <div class="reloj-block">
          <div class="reloj-time" id="reloj">00:00:00</div>
          <div class="reloj-fecha" id="relojFecha">—</div>
        </div>
      </div>
    </header>

    <!-- ── BODY ── -->
    <div class="body-grid">

      <!-- IZQUIERDA: HOY -->
      <div class="panel-hoy">
        <div class="panel-hoy-head">
          <div class="etiqueta">Operaciones de hoy</div>
          <div class="fecha-hoy" id="fechaHoy">—</div>
          <div class="panel-hoy-stats">
            <div class="stat-box">
              <div class="stat-num" id="stTotal">—</div>
              <div class="stat-lbl">Total</div>
            </div>
            <div class="stat-box">
              <div class="stat-num" id="stSal">—</div>
              <div class="stat-lbl">Salidas</div>
            </div>
            <div class="stat-box">
              <div class="stat-num" id="stReg">—</div>
              <div class="stat-lbl">Regresos</div>
            </div>
          </div>
        </div>
        <div class="hoy-lista">
          <div class="hoy-lista-inner" id="listaHoy"></div>
        </div>
      </div>

      <!-- DERECHA: SEMANA -->
      <div class="panel-semana">
        <div class="semana-nav-bar">
          <div class="semana-titulo">Agenda Semanal</div>
          <div class="semana-nav-controles">
            <button class="btn-nav" id="semanaPrev" aria-label="Semana anterior">‹</button>
            <div class="semana-rango" id="semanaRango">—</div>
            <button class="btn-nav" id="semanaNext" aria-label="Semana siguiente">›</button>
            <button class="btn-hoy" id="semanaHoy">Hoy</button>
          </div>
        </div>
        <div class="semana-grid" id="semanaGrid"></div>
      </div>

    </div>
  </div>

  <!-- BARRA INFERIOR: PRÓXIMO VUELO -->
  <div class="proximo-bar" id="proximoBar" style="display:none"></div>

  <script src="app.js"></script>
</body>
</html>
